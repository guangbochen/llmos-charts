name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

env:
  UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'https://github.com/llmos-ai/charts.git' }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Upstream Repo
        run: |
          REMOTE_NAME="upstream"
          if git remote get-url $UPSTREAM_REPO > /dev/null 2>&1; then
            echo "Remote '$REMOTE_NAME' already exists. Skipping addition."
          else
          echo "Adding remote '$REMOTE_NAME'."
            git remote add $REMOTE_NAME $UPSTREAM_REPO
          fi
#          echo "UPSTREAM_REPO=$UPSTREAM_REPO"
#          git remote rm upstream
#          git remote add upstream "$UPSTREAM_REPO"
#          git fetch upstream

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.7'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed="$(ct list-changed --config .github/linters/ct.yaml)"
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=\"${changed//$'\n'/ }\"" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config .github/linters/ct.yaml

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Check if kube-prometheus-stack is in the list
        id: check-changed-list
        run: |
          if [[ "${{ steps.list-changed.outputs.changed_list }}" == *"kube-prometheus-stack"* ]]; then
          echo "stack_changed=true" >> $GITHUB_ENV
          else
          echo "stack_changed=false" >> $GITHUB_ENV
          fi
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run Monitoring Chart Test In Specified Namespace
        env:
          CHANGED_LIST: ${{ steps.list-changed.outputs.changed_list }}
        run: |
          kubectl apply -f charts/kube-prometheus-stack/ci/ns.yaml
          ct install --namespace llmos-monitoring-system --config .github/linters/ct.yaml
        if: env.stack_changed == 'true'
      - name: Run chart-testing (install)
        run: ct install --config .github/linters/ct.yaml
        env:
          CHANGED_LIST: ${{ steps.list-changed.outputs.changed_list }}
        if: env.stack_changed != 'true'
